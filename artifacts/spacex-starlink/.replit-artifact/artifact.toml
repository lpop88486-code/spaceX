kind = "web"
previewPath = "/"
title = "SpaceXStarlink"
version = "1.0.0"
id = "artifacts/spacex-starlink"
router = "path"
hideBadge = true

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20040

[services.development]
run = "pnpm --filter @workspace/spacex-starlink run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/spacex-starlink", "run", "build" ]
publicDir = "artifacts/spacex-starlink/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20040"
BASE_PATH = "/"
